<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scolartist — Galerie Day Drawing</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e8;
    --muted: #555555;
    --text: #e8e4dc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--cream);
  }
  .logo span { color: var(--gold); font-style: italic; }

  .header-meta {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .hero {
    padding: 5rem 4rem 3rem;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: end;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 300;
    line-height: 0.95;
    color: var(--cream);
  }
  .hero-title em { color: var(--gold); font-style: italic; }

  .hero-right {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    align-items: flex-end;
  }

  .week-badge {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 0.4rem 1rem;
  }

  .hero-stats { display: flex; gap: 3rem; }

  .stat { text-align: right; }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .filters {
    padding: 1.5rem 4rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .filter-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 1rem;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }

  .gallery {
    padding: 3rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  /* LOADING STATE */
  .loading-state {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem;
    gap: 1.5rem;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ERROR STATE */
  .error-state {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem;
    gap: 1rem;
  }

  .error-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    color: var(--border);
  }

  .error-text {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    line-height: 2;
  }

  /* CARD */
  .card {
    background: var(--bg);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.3s;
    animation: fadeInUp 0.5s ease forwards;
    opacity: 0;
  }

  .card:hover { background: var(--surface); }

  .card-image {
    width: 100%;
    height: auto;
    max-height: 600px;
    object-fit: contain;
    display: block;
    background: #111;
    filter: grayscale(20%) contrast(1.05);
    transition: filter 0.4s, transform 0.4s;
  }

  .card:hover .card-image {
    filter: grayscale(0%) contrast(1.1);
    transform: scale(1.02);
  }

  .card-image-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #1a1a1a 0%, #222 50%, #1a1a1a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    color: var(--border);
    transition: transform 0.4s;
    position: relative;
    overflow: hidden;
  }

  .card-image-placeholder::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(201,168,76,0.05) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .card:hover .card-image-placeholder::after { transform: translateX(100%); }
  .card:hover .card-image-placeholder { transform: scale(1.02); }

  .rank-badge {
    position: absolute;
    top: 1rem;
    left: 1rem;
    width: 2.2rem;
    height: 2.2rem;
    background: var(--gold);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    z-index: 2;
  }

  .rank-badge.gold { background: var(--gold); }
  .rank-badge.silver { background: #9e9e9e; }
  .rank-badge.bronze { background: #a0622a; }
  .rank-badge.normal { background: var(--surface); color: var(--muted); border: 1px solid var(--border); font-size: 0.7rem; font-family: 'DM Mono', monospace; }

  .score-overlay {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(10,10,10,0.85);
    border: 1px solid var(--gold);
    padding: 0.3rem 0.6rem;
    z-index: 2;
    backdrop-filter: blur(4px);
  }

  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }

  .score-label {
    font-size: 0.45rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-body {
    padding: 1.2rem 1.5rem 1.5rem;
    border-top: 1px solid var(--border);
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
  }

  .artist-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.05em;
  }

  .challenge-day {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 0.2rem 0.5rem;
  }

  .card-theme {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 0.8rem;
    line-height: 1.3;
  }

  .card-skill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .card-skill::before { content: '✦'; font-size: 0.5rem; }

  .card-niveau {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: 0.8rem;
    border: 1px solid var(--border);
    padding: 0.15rem 0.4rem;
  }

  .vote-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .vote-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .vote-btn:hover { border-color: var(--gold); color: var(--gold); }
  .vote-btn.voted { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .vote-btn svg { width: 12px; height: 12px; transition: transform 0.2s; }
  .vote-btn:hover svg, .vote-btn.voted svg { transform: scale(1.2); }

  .vote-count { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; }

  .share-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--cream); color: var(--cream); }

  /* TOP 1 SPECIAL */
  .card.top1 { grid-column: span 2; }
  .card.top1 .card-image { max-height: 700px; }
  .card.top1 .card-image-placeholder { aspect-ratio: 16/7; font-size: 8rem; }
  .card.top1 .card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
  .card.top1 .card-critique { display: block; }

  .card-critique {
    display: none;
    font-size: 0.7rem;
    line-height: 1.6;
    color: var(--muted);
    border-left: 2px solid var(--gold);
    padding-left: 1rem;
    font-style: italic;
    margin-top: 0.5rem;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300; letter-spacing: 0.2em; color: var(--muted); }
  .footer-logo span { color: var(--gold); font-style: italic; }

  .footer-meta { font-size: 0.55rem; letter-spacing: 0.1em; color: var(--muted); text-align: right; line-height: 1.8; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--gold);
    padding: 0.8rem 2rem;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    transition: transform 0.3s;
    z-index: 500;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    header, .hero, .filters, .gallery, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    .hero { grid-template-columns: 1fr; }
    .hero-right { align-items: flex-start; }
    .hero-stats { justify-content: flex-start; }
    .card.top1 { grid-column: span 1; }
    .card.top1 .card-body { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Scol<span>artist</span></div>
  <div class="header-meta" id="header-meta">Day Drawing Challenge · Galerie publique · Chargement…</div>
</header>

<section class="hero">
  <div>
    <h1 class="hero-title">
      Top 10<br>
      <em>de la semaine</em>
    </h1>
  </div>
  <div class="hero-right">
    <div class="week-badge" id="week-badge">Chargement…</div>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="stat-soumissions">—</div>
        <div class="stat-label">Dessins soumis</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-selectionnes">—</div>
        <div class="stat-label">Sélectionnés</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-votes">—</div>
        <div class="stat-label">Votes publics</div>
      </div>
    </div>
  </div>
</section>

<div class="filters">
  <span class="filter-label">Filtrer :</span>
  <button class="filter-btn active" onclick="filterCards('all', this)">Tous</button>
  <button class="filter-btn" onclick="filterCards('Débutant', this)">Débutant</button>
  <button class="filter-btn" onclick="filterCards('Étudiant', this)">Étudiant</button>
  <button class="filter-btn" onclick="filterCards('Pro', this)">Pro</button>
</div>

<main class="gallery" id="gallery">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div class="loading-text">Chargement de la galerie…</div>
  </div>
</main>

<footer>
  <div class="footer-logo">Scol<span>artist</span></div>
  <div class="footer-meta">
    Day Drawing Challenge · chaque jour à 8h<br>
    École & Ateliers Schlum · Le Mans
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
  // ═══════════════════════════════════════════════════
  // CONFIGURATION — remplace par ton URL webhook n8n
  // ═══════════════════════════════════════════════════
  const GALLERY_JSON_URL = 'https://schlum.app.n8n.cloud/webhook/gallery-data';

  // ═══════════════════════════════════════════════════
  // FORMAT JSON ATTENDU DU WEBHOOK N8N :
  // {
  //   "semaine": "Semaine du 3 au 9 mars 2026",
  //   "numero_semaine": 9,
  //   "total_soumissions": 47,
  //   "total_votes": 128,
  //   "artworks": [
  //     {
  //       "rang": 1,
  //       "prenom": "Camille R.",
  //       "niveau": "Étudiant",
  //       "challenge_id": 17,
  //       "titre": "Portrait expressif",
  //       "score": 94.2,
  //       "url_image": "https://...",
  //       "critique": "Une maîtrise remarquable...",
  //       "votes": 32
  //     },
  //     ...
  //   ]
  // }
  // ═══════════════════════════════════════════════════

  const voted = new Set();
  let allArtworks = [];

  // Données de démo pour test offline
  const DEMO_DATA = {
    semaine: "Semaine du 3 au 9 mars 2026",
    numero_semaine: 9,
    total_soumissions: 47,
    total_votes: 128,
    artworks: [
      { rang: 1, prenom: "Camille R.", niveau: "Étudiant", challenge_id: 17, titre: "Portrait expressif avec ombre et lumière", score: 94.2, url_image: "", critique: "Une maîtrise remarquable des valeurs tonales. La source lumineuse unique crée un clair-obscur dramatique qui donne une profondeur émotionnelle rare pour ce niveau.", votes: 32 },
      { rang: 2, prenom: "Théo M.", niveau: "Pro", challenge_id: 26, titre: "Planche manga 3 cases — scène sans dialogue", score: 91.5, url_image: "", critique: "", votes: 18 },
      { rang: 3, prenom: "Léa D.", niveau: "Débutant", challenge_id: 27, titre: "Illustration de couverture — format portrait A4", score: 89.8, url_image: "", critique: "", votes: 15 },
      { rang: 4, prenom: "Hugo B.", niveau: "Étudiant", challenge_id: 20, titre: "Poses dynamiques — 5 silhouettes en action", score: 87.3, url_image: "", critique: "", votes: 11 },
      { rang: 5, prenom: "Jo", niveau: "Débutant", challenge_id: 2, titre: "Visage de face — méthode Loomis", score: 85.1, url_image: "", critique: "", votes: 9 },
      { rang: 6, prenom: "Gaspard", niveau: "Pro", challenge_id: 16, titre: "Expressions manga — yeux et bouches expressifs", score: 84.7, url_image: "", critique: "", votes: 8 },
      { rang: 7, prenom: "Emma V.", niveau: "Étudiant", challenge_id: 10, titre: "La main — étude de 5 positions différentes", score: 83.2, url_image: "", critique: "", votes: 7 },
      { rang: 8, prenom: "Nora K.", niveau: "Débutant", challenge_id: 19, titre: "Character sheet — personnage original", score: 82.0, url_image: "", critique: "", votes: 6 },
      { rang: 9, prenom: "Axel P.", niveau: "Étudiant", challenge_id: 24, titre: "Habiller mon personnage — tenue fantaisie", score: 81.4, url_image: "", critique: "", votes: 5 },
      { rang: 10, prenom: "Inès F.", niveau: "Pro", challenge_id: 21, titre: "Raccourcis perspectifs — bras tendus", score: 80.9, url_image: "", critique: "", votes: 4 }
    ]
  };

  async function loadGallery() {
    try {
      let data;

      if (false) {
        // Mode démo — données statiques
        data = DEMO_DATA;
        showToast('Mode démo — configure GALLERY_JSON_URL');
      } else {
        const res = await fetch(GALLERY_JSON_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      }

      renderGallery(data);

    } catch (err) {
      console.error('Erreur chargement galerie:', err);
      document.getElementById('gallery').innerHTML = `
        <div class="error-state">
          <div class="error-icon">✦</div>
          <div class="error-text">
            Impossible de charger la galerie<br>
            <span style="color:var(--border)">${err.message}</span>
          </div>
        </div>
      `;
    }
  }

  function renderGallery(data) {
    allArtworks = data.artworks || [];

    // Header
    document.getElementById('header-meta').textContent =
      `Day Drawing Challenge · Galerie publique · Semaine ${data.numero_semaine}`;
    document.getElementById('week-badge').textContent = data.semaine;
    document.getElementById('stat-soumissions').textContent = data.total_soumissions;
    document.getElementById('stat-selectionnes').textContent = allArtworks.length;
    document.getElementById('stat-votes').textContent = data.total_votes;

    renderCards(allArtworks);
  }

  function renderCards(artworks) {
    const gallery = document.getElementById('gallery');
    const svgHeart = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;

    gallery.innerHTML = artworks.map((a, idx) => {
      const isTop1 = a.rang === 1 && artworks === allArtworks;
      const rankClass = a.rang === 1 ? 'gold' : a.rang === 2 ? 'silver' : a.rang === 3 ? 'bronze' : 'normal';
      const rankLabel = a.rang <= 3 ? a.rang : `#${a.rang}`;
      const delay = `animation-delay: ${idx * 0.1 + 0.1}s`;

      const imageHtml = a.url_image
        ? `<img class="card-image" src="${a.url_image}" alt="Œuvre de ${a.prenom}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholderHtml = `<div class="card-image-placeholder" style="${a.url_image ? 'display:none' : ''}">🎨</div>`;

      const critiqueHtml = a.critique
        ? `<div class="card-critique">« ${a.critique} »</div>`
        : '';

      return `
        <article class="card${isTop1 ? ' top1' : ''}" data-niveau="${a.niveau}" style="${delay}">
          ${imageHtml}
          ${placeholderHtml}
          <div class="rank-badge ${rankClass}">${rankLabel}</div>
          <div class="score-overlay">
            <div class="score-num">${a.score}</div>
            <div class="score-label">Score IA</div>
          </div>
          <div class="card-body">
            <div>
              <div class="card-meta">
                <span class="artist-name">${a.prenom}</span>
                <span class="challenge-day">J · ${a.challenge_id}</span>
              </div>
              <div class="card-theme">${a.titre}</div>
              <div>
                <span class="card-skill">${a.niveau}</span>
              </div>
              <div class="vote-section">
                <button class="vote-btn${voted.has(a.rang) ? ' voted' : ''}" onclick="vote(this, ${a.rang})">
                  ${svgHeart} Voter
                </button>
                <span class="vote-count" id="votes-${a.rang}">${a.votes} votes</span>
                <button class="share-btn" onclick="share('${a.prenom}', ${a.challenge_id})">Partager →</button>
              </div>
            </div>
            ${isTop1 ? critiqueHtml : ''}
          </div>
        </article>
      `;
    }).join('');
  }

  function vote(btn, id) {
    const countEl = document.getElementById('votes-' + id);
    const current = parseInt(countEl.textContent);
    if (voted.has(id)) {
      voted.delete(id);
      btn.classList.remove('voted');
      countEl.textContent = (current - 1) + ' votes';
      showToast('Vote retiré');
    } else {
      voted.add(id);
      btn.classList.add('voted');
      countEl.textContent = (current + 1) + ' votes';
      showToast('✦ Merci pour votre vote !');
    }
  }

  function share(artist, day) {
    const text = `Je vote pour ${artist} — Défi J${day} sur Scolartist ! 🎨`;
    if (navigator.share) {
      navigator.share({ title: 'Scolartist Gallery', text, url: window.location.href });
    } else {
      navigator.clipboard.writeText(text + ' ' + window.location.href);
      showToast('Lien copié dans le presse-papier !');
    }
  }

  function filterCards(niveau, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = niveau === 'all'
      ? allArtworks
      : allArtworks.filter(a => a.niveau === niveau);
    renderCards(filtered);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Chargement au démarrage
  loadGallery();
</script>
</body>
</html>
